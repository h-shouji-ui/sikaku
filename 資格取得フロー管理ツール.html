<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資格取得フロー管理ツール｜サイコー</title>
<style>
  :root{
    --navy:#16233a;
    --navy-2:#1f3350;
    --paper:#f6f3ec;
    --paper-2:#ece7db;
    --gold:#b8863a;
    --gold-2:#d9ac5c;
    --ink:#20232b;
    --ink-soft:#5a6270;
    --line:#d8d2c2;
    --green:#3f7a54;
    --red:#a5433a;
    --white:#ffffff;
    --radius:2px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",-apple-system,BlinkMacSystemFont,sans-serif;
    line-height:1.6;
  }
  .app{max-width:1100px;margin:0 auto;padding:0 0 60px;}

  /* ヘッダー：資格証／管理票をイメージした帯 */
  header.masthead{
    background:var(--navy);
    color:var(--paper);
    padding:28px 24px 22px;
    position:relative;
    border-bottom:6px solid var(--gold);
  }
  header.masthead::before{
    content:"";
    position:absolute; top:0; left:0; right:0; bottom:0;
    background:
      repeating-linear-gradient(135deg, rgba(255,255,255,0.02) 0 2px, transparent 2px 26px);
    pointer-events:none;
  }
  .masthead-row{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;}
  .masthead-eyebrow{
    letter-spacing:.18em; font-size:11px; color:var(--gold-2); font-weight:700;
  }
  h1{
    margin:6px 0 0; font-size:26px; font-weight:800; letter-spacing:.02em;
  }
  .masthead-sub{font-size:12.5px; color:#b9c2d4; margin-top:6px;}
  .settings-gear{
    background:transparent; border:1px solid rgba(255,255,255,0.25); color:#8b96ab;
    width:30px; height:30px; border-radius:50%; font-size:13px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; flex:none;
    transition:color .15s, border-color .15s;
  }
  .settings-gear:hover{color:var(--gold-2); border-color:var(--gold-2);}
  .settings-pop{
    display:none;
    position:relative;
    max-width:1100px; margin:0 auto; padding:10px 24px;
  }
  .settings-pop.open{display:block;}
  .settings-pop > div{
    background:var(--white); border:1px solid var(--line); border-top:3px solid var(--gold);
    padding:12px 14px; max-width:460px; margin-left:auto;
  }
  .settings-pop input{
    flex:1; border:1px solid var(--line); padding:7px 9px; font-size:12.5px; border-radius:var(--radius);
  }
  .settings-pop button{
    background:var(--gold); color:var(--navy); border:none; font-weight:700; font-size:12px;
    padding:7px 14px; border-radius:var(--radius); cursor:pointer; flex:none;
  }

  /* タブ：台帳の見出しインデックス風 */
  nav.tabs{
    display:flex; flex-wrap:wrap; gap:2px;
    margin:0 24px; transform:translateY(-1px);
  }
  nav.tabs button{
    flex:1 1 150px;
    background:var(--paper-2);
    border:1px solid var(--line);
    border-bottom:none;
    color:var(--ink-soft);
    font-size:13px; font-weight:700;
    padding:12px 10px;
    cursor:pointer;
    transition:background .15s, color .15s;
  }
  nav.tabs button.active{
    background:var(--white); color:var(--navy);
    border-top:3px solid var(--gold);
  }
  nav.tabs button:hover:not(.active){background:#e2ddcd;}

  .tab-fixed{
    flex:none; background:var(--navy); color:var(--paper); border:1px solid var(--navy);
    border-bottom:none; font-size:13px; font-weight:700; padding:12px 16px; cursor:pointer;
    transition:background .15s;
  }
  .tab-fixed.active{background:var(--gold); color:var(--navy); border-color:var(--gold);}
  .tab-fixed:hover:not(.active){background:var(--navy-2);}

  main.panel{
    background:var(--white);
    margin:0 24px;
    border:1px solid var(--line);
    padding:26px 28px 34px;
  }

  .qual-head{display:flex; justify-content:space-between; align-items:flex-start; gap:16px; margin-bottom:6px;}
  .qual-title{font-size:20px; font-weight:800; color:var(--navy);}
  .qual-cat{
    display:inline-block; font-size:11px; font-weight:700; color:var(--gold);
    border:1px solid var(--gold); padding:2px 8px; border-radius:var(--radius); margin-bottom:8px;
  }
  .qual-overview{color:var(--ink-soft); font-size:13.5px; max-width:70ch;}

  .section-label{
    margin:30px 0 14px; font-size:13px; font-weight:800; color:var(--navy);
    display:flex; align-items:center; gap:10px;
  }
  .section-label::after{content:"";flex:1;height:1px;background:var(--line);}

  /* フロー：番号付きタイムライン（実際に手順の順序があるため） */
  ol.flow{list-style:none; margin:0; padding:0; counter-reset:step;}
  ol.flow li{
    position:relative; padding:4px 0 20px 44px; counter-increment:step;
  }
  ol.flow li::before{
    content:counter(step);
    position:absolute; left:0; top:0;
    width:28px; height:28px; border-radius:50%;
    background:var(--navy); color:var(--paper);
    font-size:12px; font-weight:800;
    display:flex; align-items:center; justify-content:center;
  }
  ol.flow li::after{
    content:""; position:absolute; left:13px; top:30px; bottom:0; width:2px; background:var(--line);
  }
  ol.flow li:last-child::after{display:none;}
  .step-name{font-weight:700; font-size:14.5px; color:var(--ink); margin-bottom:2px;}
  .step-detail{font-size:13px; color:var(--ink-soft);}
  .step-flag{
    display:inline-block; margin-top:5px; font-size:11px; color:var(--red);
    border:1px solid var(--red); padding:1px 7px; border-radius:var(--radius);
  }
  .step-edit-row{display:flex; gap:8px; margin-top:8px;}
  .step-edit-row button{font-size:11px; padding:3px 8px; cursor:pointer; border:1px solid var(--line); background:var(--paper); border-radius:var(--radius);}

  /* 連絡先 */
  .contact-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px;}
  .contact-card{
    border:1px solid var(--line); padding:14px 16px; position:relative; background:var(--paper);
  }
  .contact-card .org-type{font-size:10.5px; color:var(--gold); font-weight:700; letter-spacing:.05em;}
  .contact-card .org-name{font-size:15px; font-weight:800; color:var(--navy); margin:2px 0 8px;}
  .contact-card dl{margin:0; font-size:12.5px; color:var(--ink-soft);}
  .contact-card dl div{display:flex; gap:6px; margin-bottom:3px;}
  .contact-card dl dt{width:52px; flex:none; color:#8a8265; font-weight:700;}
  .contact-card .links{margin-top:8px; display:flex; flex-direction:column; gap:4px;}
  .contact-card .links a{
    font-size:12px; color:var(--navy); background:var(--white); border:1px solid var(--line);
    padding:4px 8px; text-decoration:none; display:flex; align-items:center; gap:6px;
    word-break:break-all;
  }
  .contact-card .links a:hover{border-color:var(--gold); color:var(--gold);}
  .contact-card .links a::before{content:"↗"; color:var(--gold); flex:none;}
  .contact-card .card-actions{position:absolute; top:12px; right:12px; display:flex; gap:6px;}
  .contact-card .card-actions button{
    font-size:11px; border:1px solid var(--line); background:var(--white); padding:3px 7px; cursor:pointer; border-radius:var(--radius);
  }
  .contact-empty{
    grid-column:1/-1; text-align:center; padding:26px 10px; color:var(--ink-soft); font-size:13px;
    border:1px dashed var(--line);
  }

  .add-contact-btn, .primary-btn{
    background:var(--navy); color:var(--paper); border:none; padding:9px 16px; font-size:13px;
    font-weight:700; cursor:pointer; border-radius:var(--radius);
  }
  .add-contact-btn:hover, .primary-btn:hover{background:var(--navy-2);}
  .ghost-btn{
    background:transparent; border:1px solid var(--line); color:var(--ink-soft); padding:9px 16px;
    font-size:13px; cursor:pointer; border-radius:var(--radius);
  }

  /* 誓約書管理 */
  .pledge-toolbar{display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:14px; flex-wrap:wrap;}
  .pledge-toolbar select{border:1px solid var(--line); padding:7px 10px; font-size:13px; border-radius:var(--radius); background:var(--white);}
  table.pledge-table{width:100%; border-collapse:collapse; font-size:12.5px;}
  table.pledge-table th, table.pledge-table td{
    border-bottom:1px solid var(--line); padding:9px 8px; text-align:left; vertical-align:top;
  }
  table.pledge-table th{color:var(--navy); font-weight:800; background:var(--paper-2); font-size:11.5px;}
  table.pledge-table td.num{text-align:right; font-variant-numeric:tabular-nums;}
  table.pledge-table .row-actions{display:flex; gap:6px; white-space:nowrap;}
  table.pledge-table .row-actions button{
    font-size:11px; border:1px solid var(--line); background:var(--paper); padding:3px 7px; cursor:pointer; border-radius:var(--radius);
  }
  .pledge-empty{text-align:center; padding:30px 10px; color:var(--ink-soft); font-size:13px; border:1px dashed var(--line);}

  /* モーダル */
  .modal-back{
    display:none; position:fixed; inset:0; background:rgba(22,35,58,.55); z-index:50;
    align-items:center; justify-content:center; padding:20px;
  }
  .modal-back.open{display:flex;}
  .modal{
    background:var(--white); width:100%; max-width:440px; padding:24px 26px; border-top:5px solid var(--gold);
  }
  .modal h3{margin:0 0 16px; font-size:16px; color:var(--navy);}
  .modal label{display:block; font-size:12px; font-weight:700; color:var(--ink-soft); margin:12px 0 4px;}
  .modal input, .modal textarea{
    width:100%; border:1px solid var(--line); padding:8px 10px; font-size:13.5px; border-radius:var(--radius);
    font-family:inherit;
  }
  .modal textarea{resize:vertical; min-height:50px;}
  .modal-actions{display:flex; justify-content:flex-end; gap:8px; margin-top:20px;}

  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:var(--navy); color:var(--paper); padding:10px 20px; font-size:13px;
    border-radius:var(--radius); z-index:60; opacity:0; transition:opacity .25s; pointer-events:none;
  }
  .toast.show{opacity:1;}

  footer.note{
    margin:22px 24px 0; font-size:11.5px; color:var(--ink-soft); border-top:1px solid var(--line); padding-top:12px;
  }

  @media (max-width:640px){
    main.panel{padding:20px 16px 28px;}
    header.masthead{padding:22px 16px 18px;}
    nav.tabs{margin:0 16px;}
    footer.note{margin:22px 16px 0;}
  }
</style>
</head>
<body>

<div class="app">
  <header class="masthead">
    <div class="masthead-row">
      <div>
        <div class="masthead-eyebrow">株式会社サイコー　資格・免許管理台帳</div>
        <h1>資格取得フロー管理ツール</h1>
        <div class="masthead-sub">問い合わせ〜取得までの手順と、教習機関・発行機関の連絡先を一元管理します</div>
      </div>
      <button class="settings-gear" id="settingsGear" title="接続設定" aria-label="接続設定">⚙</button>
    </div>
  </header>

  <div class="settings-pop" id="settingsPop">
    <div>
      <label style="display:block;font-size:11px;font-weight:700;color:var(--ink-soft);margin-bottom:6px;">GAS ウェブアプリURL（管理者設定）</label>
      <div style="display:flex;gap:8px;">
        <input id="gasUrlInput" type="text" placeholder="https://script.google.com/macros/s/.../exec">
        <button id="gasSaveBtn">接続</button>
      </div>
    </div>
  </div>

  <div style="display:flex; align-items:flex-end; gap:8px; margin:0 24px;">
    <nav class="tabs" id="tabs" style="margin:0; flex:1;"></nav>
    <button class="tab-fixed" id="pledgeTabBtn">誓約書管理</button>
    <button class="ghost-btn" id="addQualBtn" style="margin-bottom:0; white-space:nowrap;">＋ 資格を追加</button>
  </div>
  <main class="panel" id="panel"></main>

  <footer class="note">
    ※ 各手順の所要時間・要件は制度の一般的な内容です。「要確認」表示のある項目は、実際に問い合わせる際に最終確認してください。<br>
    ※ 連絡先はスプレッドシート上に保存され、この画面から追加・編集・削除ができます（チーム共有）。
  </footer>
</div>

<div class="modal-back" id="modalBack">
  <div class="modal">
    <h3 id="modalTitle">連絡先を追加</h3>
    <input type="hidden" id="m_contact_id">
    <input type="hidden" id="m_qual_id">
    <label>種別（例：教習機関／発行機関）</label>
    <input id="m_org_type" placeholder="教習機関">
    <label>業者名・機関名</label>
    <input id="m_org_name" placeholder="〇〇自動車教習所">
    <label>電話番号</label>
    <input id="m_tel" placeholder="022-000-0000">
    <label>住所</label>
    <input id="m_address" placeholder="宮城県仙台市〇〇区…">
    <label>担当者</label>
    <input id="m_contact_person" placeholder="任意">
    <label>リンク（開催案内・申込書など／1行に1件）</label>
    <textarea id="m_links" placeholder="https://example.com/kaisai.pdf&#10;https://example.com/mousikomi.pdf"></textarea>
    <label>備考</label>
    <textarea id="m_memo" placeholder="料金の目安、予約の取りやすさなど"></textarea>
    <div class="modal-actions">
      <button class="ghost-btn" id="modalCancel">キャンセル</button>
      <button class="primary-btn" id="modalSave">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-back" id="qualModalBack">
  <div class="modal">
    <h3>資格を追加</h3>
    <input type="hidden" id="q_qual_id">
    <label>資格・免許名</label>
    <input id="q_qual_name" placeholder="例：車両系建設機械（ローダー等）運転技能講習">
    <label>カテゴリ</label>
    <input id="q_category" placeholder="例：技能講習／運転免許／技術者資格">
    <label>概要</label>
    <textarea id="q_overview" placeholder="対象範囲、根拠法令、取得方法の概要など"></textarea>
    <div class="modal-actions">
      <button class="ghost-btn" id="qualModalCancel">キャンセル</button>
      <button class="primary-btn" id="qualModalSave">保存</button>
    </div>
  </div>
</div>

<div class="modal-back" id="stepModalBack">
  <div class="modal">
    <h3 id="stepModalTitle">手順を追加</h3>
    <input type="hidden" id="s_step_id">
    <input type="hidden" id="s_qual_id">
    <label>手順名</label>
    <input id="s_step_name" placeholder="例：会社所定の誓約書を提出">
    <label>内容</label>
    <textarea id="s_detail" placeholder="具体的に何をするか"></textarea>
    <label>表示順（番号）</label>
    <input id="s_step_no" type="number" min="1" placeholder="例：3">
    <label>注意書き（要確認事項など／任意）</label>
    <input id="s_duration_note" placeholder="例：要確認：対象者と提出タイミング">
    <div class="modal-actions">
      <button class="ghost-btn" id="stepModalCancel">キャンセル</button>
      <button class="primary-btn" id="stepModalSave">保存</button>
    </div>
  </div>
</div>


<div class="modal-back" id="pledgeModalBack">
  <div class="modal">
    <h3 id="pledgeModalTitle">誓約書を登録</h3>
    <input type="hidden" id="p_pledge_id">
    <label>年度</label>
    <input id="p_fiscal_year" placeholder="例：2026年度">
    <label>社員番号</label>
    <input id="p_employee_no" placeholder="例：1023">
    <label>氏名</label>
    <input id="p_employee_name" placeholder="例：山田 太郎">
    <label>資格・免許種類</label>
    <select id="p_qual_id"></select>
    <label>資格・免許取得日</label>
    <input id="p_acquired_date" type="date">
    <label>受講料金（合計・円）</label>
    <input id="p_tuition_amount" type="number" min="0" placeholder="例：29700">
    <label>受講料返金の期限</label>
    <input id="p_refund_deadline" type="date">
    <label>誓約書提出日</label>
    <input id="p_submitted_date" type="date">
    <label>備考</label>
    <textarea id="p_memo" placeholder="任意"></textarea>
    <div class="modal-actions">
      <button class="ghost-btn" id="pledgeModalCancel">キャンセル</button>
      <button class="primary-btn" id="pledgeModalSave">保存</button>
    </div>
  </div>
</div>

<script>
const LS_KEY = 'shikaku_flow_gas_url';
let GAS_URL = localStorage.getItem(LS_KEY) || '';
document.getElementById('gasUrlInput').value = GAS_URL;

let STATE = { qualifications: [], flows: [], contacts: [], pledges: [] };
let ACTIVE_QUAL = null;
let VIEW_MODE = 'qual'; // 'qual' または 'pledge'
let PLEDGE_YEAR_FILTER = 'すべて';

const $ = (sel) => document.querySelector(sel);
const toastEl = $('#toast');
function toast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(()=>toastEl.classList.remove('show'), 2200);
}

$('#settingsGear').addEventListener('click', () => {
  $('#settingsPop').classList.toggle('open');
});

// ---- 接続設定 ----
$('#gasSaveBtn').addEventListener('click', () => {
  GAS_URL = $('#gasUrlInput').value.trim();
  localStorage.setItem(LS_KEY, GAS_URL);
  $('#settingsPop').classList.remove('open');
  toast('接続先を保存しました。データを読み込みます…');
  loadAll();
});

async function loadAll(){
  if(!GAS_URL){
    renderNoConnection();
    return;
  }
  try{
    const res = await fetch(GAS_URL, { method:'GET' });
    const data = await res.json();
    STATE.qualifications = data.qualifications || [];
    STATE.flows = data.flows || [];
    STATE.contacts = data.contacts || [];
    STATE.pledges = data.pledges || [];
    if(!ACTIVE_QUAL && STATE.qualifications.length) ACTIVE_QUAL = STATE.qualifications[0].qual_id;
    renderTabs();
    renderPanel();
  }catch(err){
    console.error(err);
    toast('読み込みに失敗しました。GAS URLを確認してください。');
  }
}

function renderNoConnection(){
  $('#tabs').innerHTML = '';
  $('#panel').innerHTML = `
    <div style="text-align:center; padding:40px 10px; color:var(--ink-soft);">
      <p style="font-size:14px; font-weight:700; color:var(--navy);">まだGASと接続されていません</p>
      <p style="font-size:13px; max-width:50ch; margin:8px auto 0;">
        右上の <strong>⚙ 接続設定</strong> からGoogle Apps ScriptのウェブアプリURLを入力してください。<br>
        セットアップ手順は同梱の「GASコード」ファイル冒頭のコメントを参照してください。
      </p>
    </div>
    <div style="margin-top:16px; text-align:center;">
      <button class="ghost-btn" onclick="document.getElementById('settingsGear').click()">接続設定を開く</button>
    </div>`;
}

function renderTabs(){
  const tabs = $('#tabs');
  tabs.innerHTML = '';
  STATE.qualifications.forEach(q => {
    const btn = document.createElement('button');
    btn.textContent = q.qual_name;
    btn.className = (VIEW_MODE === 'qual' && q.qual_id === ACTIVE_QUAL) ? 'active' : '';
    btn.addEventListener('click', () => { VIEW_MODE = 'qual'; ACTIVE_QUAL = q.qual_id; renderTabs(); renderPanel(); });
    tabs.appendChild(btn);
  });
  $('#pledgeTabBtn').className = 'tab-fixed' + (VIEW_MODE === 'pledge' ? ' active' : '');
}
$('#pledgeTabBtn').addEventListener('click', () => { VIEW_MODE = 'pledge'; renderTabs(); renderPanel(); });

function renderPanel(){
  if(VIEW_MODE === 'pledge'){ renderPledgePanel(); return; }
  const q = STATE.qualifications.find(x => x.qual_id === ACTIVE_QUAL);
  const panel = $('#panel');
  if(!q){ panel.innerHTML = ''; return; }

  const steps = STATE.flows.filter(f => f.qual_id === ACTIVE_QUAL)
                            .sort((a,b) => Number(a.step_no) - Number(b.step_no));
  const contacts = STATE.contacts.filter(c => c.qual_id === ACTIVE_QUAL);

  panel.innerHTML = `
    <div class="qual-head">
      <div>
        <div class="qual-cat">${escapeHtml(q.category || '')}</div>
        <div class="qual-title">${escapeHtml(q.qual_name)}</div>
        <div class="qual-overview">${escapeHtml(q.overview || '')}</div>
      </div>
    </div>

    <div class="section-label">手続きの流れ</div>
    <ol class="flow" id="flowList"></ol>
    <div style="display:flex; justify-content:flex-end; margin:4px 0 0;">
      <button class="ghost-btn" id="addStepBtn">＋ 手順を追加</button>
    </div>

    <div class="section-label">問い合わせ先・連絡先</div>
    <div style="display:flex; justify-content:flex-end; margin-bottom:12px;">
      <button class="add-contact-btn" id="addContactBtn">＋ 連絡先を追加</button>
    </div>
    <div class="contact-grid" id="contactGrid"></div>
  `;

  const flowList = $('#flowList');
  if(steps.length === 0){
    flowList.innerHTML = '<li style="padding-left:0;color:var(--ink-soft);font-size:13px;">フロー情報がまだ登録されていません。</li>';
  }
  steps.forEach(s => {
    const li = document.createElement('li');
    li.innerHTML = `
      <div class="step-name">${escapeHtml(s.step_name)}</div>
      <div class="step-detail">${escapeHtml(s.detail || '')}</div>
      ${s.duration_note ? `<div class="step-flag">${escapeHtml(s.duration_note)}</div>` : ''}
      <div class="step-edit-row">
        <button data-act="edit">編集</button>
        <button data-act="del">削除</button>
      </div>
    `;
    li.querySelector('[data-act="edit"]').addEventListener('click', () => openStepModal(s));
    li.querySelector('[data-act="del"]').addEventListener('click', () => deleteStep(s));
    flowList.appendChild(li);
  });

  $('#addStepBtn').addEventListener('click', () => openStepModal(null));

  const grid = $('#contactGrid');
  if(contacts.length === 0){
    grid.innerHTML = '<div class="contact-empty">この資格の連絡先はまだ登録されていません。「＋ 連絡先を追加」から登録してください。</div>';
  } else {
    contacts.forEach(c => {
      const card = document.createElement('div');
      card.className = 'contact-card';
      card.innerHTML = `
        <div class="card-actions">
          <button data-act="edit">編集</button>
          <button data-act="del">削除</button>
        </div>
        <div class="org-type">${escapeHtml(c.org_type || '')}</div>
        <div class="org-name">${escapeHtml(c.org_name || '（名称未登録）')}</div>
        <dl>
          <div><dt>電話</dt><span>${escapeHtml(c.tel || '未登録')}</span></div>
          <div><dt>住所</dt><span>${escapeHtml(c.address || '未登録')}</span></div>
          <div><dt>担当</dt><span>${escapeHtml(c.contact_person || '-')}</span></div>
          ${c.memo ? `<div><dt>備考</dt><span>${escapeHtml(c.memo)}</span></div>` : ''}
        </dl>
        ${renderLinks(c.links)}
      `;
      card.querySelector('[data-act="edit"]').addEventListener('click', () => openModal(c));
      card.querySelector('[data-act="del"]').addEventListener('click', () => deleteContact(c));
      grid.appendChild(card);
    });
  }

  $('#addContactBtn').addEventListener('click', () => openModal(null));
}

function renderPledgePanel(){
  const panel = $('#panel');
  const years = Array.from(new Set(STATE.pledges.map(p => p.fiscal_year).filter(Boolean)))
                     .sort().reverse();
  const shown = PLEDGE_YEAR_FILTER === 'すべて'
    ? STATE.pledges
    : STATE.pledges.filter(p => p.fiscal_year === PLEDGE_YEAR_FILTER);
  shown.sort((a,b) => (b.submitted_date || '').localeCompare(a.submitted_date || ''));

  panel.innerHTML = `
    <div class="qual-head">
      <div>
        <div class="qual-cat">年度別台帳</div>
        <div class="qual-title">誓約書管理</div>
        <div class="qual-overview">資格・免許取得にあたって提出された誓約書（社員番号・氏名・取得資格・受講料・返金期限）を年度ごとに記録します。</div>
      </div>
    </div>
    <div class="pledge-toolbar">
      <select id="pledgeYearFilter">
        <option value="すべて">すべての年度</option>
        ${years.map(y => `<option value="${escapeHtml(y)}" ${y===PLEDGE_YEAR_FILTER?'selected':''}>${escapeHtml(y)}</option>`).join('')}
      </select>
      <button class="add-contact-btn" id="addPledgeBtn">＋ 誓約書を登録</button>
    </div>
    <div id="pledgeTableWrap"></div>
  `;

  $('#pledgeYearFilter').addEventListener('change', (e) => {
    PLEDGE_YEAR_FILTER = e.target.value;
    renderPledgePanel();
  });
  $('#addPledgeBtn').addEventListener('click', () => openPledgeModal(null));

  const wrap = $('#pledgeTableWrap');
  if(shown.length === 0){
    wrap.innerHTML = '<div class="pledge-empty">該当する誓約書はまだ登録されていません。「＋ 誓約書を登録」から追加してください。</div>';
    return;
  }
  const qualName = (id) => (STATE.qualifications.find(q => q.qual_id === id) || {}).qual_name || '（不明）';
  const table = document.createElement('table');
  table.className = 'pledge-table';
  table.innerHTML = `
    <thead><tr>
      <th>年度</th><th>社員番号</th><th>氏名</th><th>資格・免許種類</th><th>取得日</th>
      <th>受講料金</th><th>返金期限</th><th>提出日</th><th></th>
    </tr></thead>
    <tbody></tbody>
  `;
  const tbody = table.querySelector('tbody');
  shown.forEach(p => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${escapeHtml(p.fiscal_year)}</td>
      <td>${escapeHtml(p.employee_no)}</td>
      <td>${escapeHtml(p.employee_name)}</td>
      <td>${escapeHtml(qualName(p.qual_id))}</td>
      <td>${escapeHtml(p.acquired_date)}</td>
      <td class="num">${p.tuition_amount ? Number(p.tuition_amount).toLocaleString() + '円' : ''}</td>
      <td>${escapeHtml(p.refund_deadline)}</td>
      <td>${escapeHtml(p.submitted_date)}</td>
      <td><div class="row-actions"><button data-act="edit">編集</button><button data-act="del">削除</button></div></td>
    `;
    tr.querySelector('[data-act="edit"]').addEventListener('click', () => openPledgeModal(p));
    tr.querySelector('[data-act="del"]').addEventListener('click', () => deletePledge(p));
    tbody.appendChild(tr);
  });
  wrap.innerHTML = '';
  wrap.appendChild(table);
}

const pledgeModalBack = $('#pledgeModalBack');
function openPledgeModal(p){
  $('#pledgeModalTitle').textContent = p ? '誓約書を編集' : '誓約書を登録';
  $('#p_pledge_id').value = p ? p.pledge_id : ('p_' + Date.now());
  $('#p_fiscal_year').value = p ? (p.fiscal_year || '') : '';
  $('#p_employee_no').value = p ? (p.employee_no || '') : '';
  $('#p_employee_name').value = p ? (p.employee_name || '') : '';
  const sel = $('#p_qual_id');
  sel.innerHTML = STATE.qualifications.map(q => `<option value="${escapeHtml(q.qual_id)}">${escapeHtml(q.qual_name)}</option>`).join('');
  sel.value = p ? (p.qual_id || '') : (STATE.qualifications[0] ? STATE.qualifications[0].qual_id : '');
  $('#p_acquired_date').value = p ? (p.acquired_date || '') : '';
  $('#p_tuition_amount').value = p ? (p.tuition_amount || '') : '';
  $('#p_refund_deadline').value = p ? (p.refund_deadline || '') : '';
  $('#p_submitted_date').value = p ? (p.submitted_date || '') : '';
  $('#p_memo').value = p ? (p.memo || '') : '';
  pledgeModalBack.classList.add('open');
}
$('#pledgeModalCancel').addEventListener('click', () => pledgeModalBack.classList.remove('open'));
$('#pledgeModalSave').addEventListener('click', async () => {
  const row = {
    pledge_id: $('#p_pledge_id').value,
    fiscal_year: $('#p_fiscal_year').value.trim(),
    employee_no: $('#p_employee_no').value.trim(),
    employee_name: $('#p_employee_name').value.trim(),
    qual_id: $('#p_qual_id').value,
    acquired_date: $('#p_acquired_date').value,
    tuition_amount: $('#p_tuition_amount').value,
    refund_deadline: $('#p_refund_deadline').value,
    submitted_date: $('#p_submitted_date').value,
    memo: $('#p_memo').value.trim()
  };
  if(!row.employee_name){ toast('氏名を入力してください'); return; }
  if(!row.fiscal_year){ toast('年度を入力してください'); return; }
  await postAction({ action:'savePledge', row });
  pledgeModalBack.classList.remove('open');
  toast('誓約書を保存しました');
  await loadAll();
  VIEW_MODE = 'pledge'; renderTabs(); renderPanel();
});
async function deletePledge(p){
  if(!confirm(`「${p.employee_name}」の誓約書記録を削除しますか？`)) return;
  await postAction({ action:'deletePledge', id: p.pledge_id });
  toast('削除しました');
  await loadAll();
  VIEW_MODE = 'pledge'; renderTabs(); renderPanel();
}

function renderLinks(linksRaw){
  const urls = String(linksRaw ?? '').split('\n').map(s => s.trim()).filter(Boolean);
  if(urls.length === 0) return '';
  return '<div class="links">' + urls.map(u => {
    const safeHref = /^https?:\/\//i.test(u) ? u : ('https://' + u);
    return `<a href="${escapeHtml(safeHref)}" target="_blank" rel="noopener noreferrer">${escapeHtml(u)}</a>`;
  }).join('') + '</div>';
}

function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

// ---- モーダル（資格の追加） ----
const qualModalBack = $('#qualModalBack');
$('#addQualBtn').addEventListener('click', () => {
  $('#q_qual_id').value = 'q_' + Date.now();
  $('#q_qual_name').value = '';
  $('#q_category').value = '';
  $('#q_overview').value = '';
  qualModalBack.classList.add('open');
});
$('#qualModalCancel').addEventListener('click', () => qualModalBack.classList.remove('open'));
$('#qualModalSave').addEventListener('click', async () => {
  const row = {
    qual_id: $('#q_qual_id').value,
    qual_name: $('#q_qual_name').value.trim(),
    category: $('#q_category').value.trim(),
    overview: $('#q_overview').value.trim()
  };
  if(!row.qual_name){ toast('資格・免許名を入力してください'); return; }
  await postAction({ action:'saveQualification', row });
  qualModalBack.classList.remove('open');
  ACTIVE_QUAL = row.qual_id;
  toast('資格を追加しました。続けて「手順を追加」からフローを登録してください');
  await loadAll();
});

// ---- モーダル（手順の追加・編集） ----
const stepModalBack = $('#stepModalBack');
function openStepModal(step){
  $('#stepModalTitle').textContent = step ? '手順を編集' : '手順を追加';
  $('#s_step_id').value = step ? step.step_id : ('s_' + Date.now());
  $('#s_qual_id').value = ACTIVE_QUAL;
  $('#s_step_name').value = step ? (step.step_name || '') : '';
  $('#s_detail').value = step ? (step.detail || '') : '';
  const existingSteps = STATE.flows.filter(f => f.qual_id === ACTIVE_QUAL);
  const nextNo = existingSteps.length ? Math.max(...existingSteps.map(f => Number(f.step_no) || 0)) + 1 : 1;
  $('#s_step_no').value = step ? step.step_no : nextNo;
  $('#s_duration_note').value = step ? (step.duration_note || '') : '';
  stepModalBack.classList.add('open');
}
$('#stepModalCancel').addEventListener('click', () => stepModalBack.classList.remove('open'));
$('#stepModalSave').addEventListener('click', async () => {
  const row = {
    step_id: $('#s_step_id').value,
    qual_id: $('#s_qual_id').value,
    step_no: Number($('#s_step_no').value) || 1,
    step_name: $('#s_step_name').value.trim(),
    detail: $('#s_detail').value.trim(),
    duration_note: $('#s_duration_note').value.trim(),
    memo: ''
  };
  if(!row.step_name){ toast('手順名を入力してください'); return; }
  await postAction({ action:'saveStep', row });
  stepModalBack.classList.remove('open');
  toast('手順を保存しました');
  await loadAll();
});
async function deleteStep(s){
  if(!confirm(`手順「${s.step_name}」を削除しますか？`)) return;
  await postAction({ action:'deleteStep', id: s.step_id });
  toast('削除しました');
  await loadAll();
}

// ---- モーダル（連絡先の追加・編集） ----
const modalBack = $('#modalBack');
function openModal(contact){
  $('#modalTitle').textContent = contact ? '連絡先を編集' : '連絡先を追加';
  $('#m_contact_id').value = contact ? contact.contact_id : ('c_' + Date.now());
  $('#m_qual_id').value = ACTIVE_QUAL;
  $('#m_org_type').value = contact ? (contact.org_type || '') : '';
  $('#m_org_name').value = contact ? (contact.org_name || '') : '';
  $('#m_tel').value = contact ? (contact.tel || '') : '';
  $('#m_address').value = contact ? (contact.address || '') : '';
  $('#m_contact_person').value = contact ? (contact.contact_person || '') : '';
  $('#m_links').value = contact ? (contact.links || '') : '';
  $('#m_memo').value = contact ? (contact.memo || '') : '';
  modalBack.classList.add('open');
}
$('#modalCancel').addEventListener('click', () => modalBack.classList.remove('open'));

$('#modalSave').addEventListener('click', async () => {
  const row = {
    contact_id: $('#m_contact_id').value,
    qual_id: $('#m_qual_id').value,
    org_type: $('#m_org_type').value.trim(),
    org_name: $('#m_org_name').value.trim(),
    tel: $('#m_tel').value.trim(),
    address: $('#m_address').value.trim(),
    contact_person: $('#m_contact_person').value.trim(),
    links: $('#m_links').value.trim(),
    memo: $('#m_memo').value.trim(),
    updated_at: new Date().toISOString()
  };
  if(!row.org_name){ toast('業者名・機関名を入力してください'); return; }

  await postAction({ action:'saveContact', row });
  modalBack.classList.remove('open');
  toast('連絡先を保存しました');
  await loadAll();
});

async function deleteContact(c){
  if(!confirm(`「${c.org_name}」を削除しますか？`)) return;
  await postAction({ action:'deleteContact', id: c.contact_id });
  toast('削除しました');
  await loadAll();
}

async function postAction(payload){
  if(!GAS_URL){ toast('先にGAS URLを接続してください'); return; }
  try{
    await fetch(GAS_URL, {
      method:'POST',
      headers:{ 'Content-Type':'text/plain;charset=utf-8' }, // シンプルリクエストにしてCORSプリフライトを回避
      body: JSON.stringify(payload)
    });
  }catch(err){
    console.error(err);
    toast('保存に失敗しました。通信環境を確認してください。');
  }
}

// 初期表示
if(GAS_URL){ loadAll(); } else { renderNoConnection(); }
